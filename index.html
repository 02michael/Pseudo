<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="topBar">
      <div class="topNote">
        CREATE FOR THE CODEPEN BEFORE & AFTER COMPETITION
      </div>

      <div class="pseudoRow" role="group" aria-label="Pseudo layer filters">
        <button
          class="pseudoBtn"
          id="btnBefore"
          type="button"
          aria-pressed="false"
        >
          ::before
        </button>
        <button
          class="pseudoBtn"
          id="btnAfter"
          type="button"
          aria-pressed="false"
        >
          ::after
        </button>
      </div>
    </div>

    <div class="cuteGrid">
      <h1 class="cute c-bubble" data-text="BUBBLE POP">BUBBLE POP</h1>
      <h1 class="cute c-sprinkle" data-text="SPRINKLE GLOW">SPRINKLE GLOW</h1>
      <h1 class="cute c-sticker" data-text="STICKER KISS">STICKER KISS</h1>
      <h1 class="cute c-candy" data-text="CANDY WAVE">CANDY WAVE</h1>
      <h1 class="cute c-heart" data-text="HEART BEAM">HEART BEAM</h1>
    </div>
  </body>
</html>
